group: ita_base_main
task:
  # STEM Multiple Choice (3 entries)
  - ita_stem_qa_mc
  # Non-STEM Multiple Choice (1 entry)
  - ita_nonstem_qa_mc
  # AGIEval Multiple Choice (8 subsets)
  - ita_agieval_mc
  # Generative / RC (1 task)
  - ita_gen
  # Math Reasoning (1 task)
  - ita_math
  # Heldout
  - ita_heldout
aggregate_metric_list:
  - metric: acc
    aggregation: mean
    weight_by_size: false
  - metric: acc_norm
    aggregation: mean
    weight_by_size: false
  - metric: exact_match
    aggregation: mean
    weight_by_size: false
metadata:
  version: 1.0
  description: "Italian base main evaluation suite"
