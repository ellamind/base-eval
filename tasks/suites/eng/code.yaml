# Code Generation Tasks
#
# Tasks: HumanEval, MBPP (Python code generation)
# Format: Generate code completion, evaluate with code execution
# Metric: pass@1
# Sampling: n=10 samples per problem
#
# LIMITATION: Only HumanEval and MBPP are included. BigCodeBench, DS1000,
# MultiPL-E, and DeepSeek LeetCode require external AWS Lambda execution
# infrastructure and are excluded from this suite.

group: code
task:
  - humaneval_code
  - mbpp_code
aggregate_metric_list:
  - metric: pass@1
    aggregation: mean
    weight_by_size: false
metadata:
  version: 1.0
  description: "Code generation tasks (HumanEval, MBPP)"
  excluded_tasks:
    - "bigcodebench (requires Lambda)"
    - "ds1000 (requires Lambda)"
    - "multipl_e (requires Lambda)"
    - "deepseek_leetcode (requires Lambda)"
