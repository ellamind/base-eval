# AGIEval Italian Rank Choice Template
# Following OLMES :rc format — no choices in prompt, target is full choice text.
# Metric: acc_norm (length-normalized loglikelihood over choices).
dataset_path: ellamind/agieval-multilingual
dataset_name: ita
test_split: test
output_type: multiple_choice
doc_to_text: "Domanda: {{question}}\nRisposta:"
doc_to_target: "{{answer_idx}}"
doc_to_choice: "{{choices}}"
num_fewshot: 3
fewshot_config:
  sampler: first_n
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
  - metric: acc_norm
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
