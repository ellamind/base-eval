# Basic Skills BPB Template (answer-only, OLMES-style)
# BPB = -log2 P(answer | context) / bytes(answer)

dataset_path: ellamind/basic-skills
test_split: validation
fewshot_split: validation
output_type: loglikelihood
target_delimiter: ""
doc_to_text: "Question: {{question}}\nAnswer:"
doc_to_target: " {{answer}}"
num_fewshot: 5
process_results: !function utils.process_results_bpb
metric_list:
  - metric: bits_per_byte
    aggregation: mean
    higher_is_better: false
metadata:
  version: 1.0
