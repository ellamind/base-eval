include: _naturalqs_template.yaml
task: naturalqs_mc
dataset_path: allenai/nq-gen2mc
test_split: validation
num_fewshot: 5
output_type: multiple_choice
doc_to_text: "Question: {{question}}\nAnswer:"
doc_to_text: "Question: {{question}}\n {{choices.label[0]}}. {{choices.text[0]}}\n {{choices.label[1]}}. {{choices.text[1]}}\n {{choices.label[2]}}. {{choices.text[2]}}\n {{choices.label[3]}}. {{choices.text[3]}}\nAnswer:"
doc_to_target: "{{answerKey}}"
doc_to_choice: "{{choices.label}}"
fewshot_config:
  sampler: first_n
  samples: !function utils.get_naturalqs_mc_fewshot
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
  - metric: acc_norm # olmes primary
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
  description: "Natural Questions - open domain QA (gen2mc multiple choice)"
  fewshot_source: "OLMES:naturalqs_mc"
