include: _squad_template.yaml
task: squad_mc
dataset_path: allenai/squad-gen2mc
test_split: validation
output_type: multiple_choice
doc_to_text: "Title: {{title_original}}\nPassage: {{context_original}}\nQuestion: {{question_original}}\n {{choices.label[0]}}. {{choices.text[0]}}\n {{choices.label[1]}}. {{choices.text[1]}}\n {{choices.label[2]}}. {{choices.text[2]}}\n {{choices.label[3]}}. {{choices.text[3]}}\nAnswer:"
doc_to_target: "{{answerKey}}"
doc_to_choice: "{{choices.label}}"
fewshot_config:
  sampler: first_n
  samples: !function utils.get_squad_olmes_mc_fewshot
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
  - metric: acc_norm
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
  description: "SQuAD - reading comprehension (gen2mc multiple choice)"
  fewshot_source: "OLMES:squad_mc"
