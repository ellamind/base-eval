include: _squad_template.yaml
task: squad_gen
dataset_path: allenai/squad
test_split: validation
output_type: generate_until
description: "The following are reading comprehension questions, where the answer to each question is a segment of text from the corresponding background text.\n\n"
doc_to_text: "Title: {{title}}\nBackground: {{context}}\nQuestion: {{question}}\nAnswer:"
doc_to_target: "{{answers.text[0] if answers.text else ''}}"
generation_kwargs:
  max_gen_toks: 50
  until:
    - "\n\n"
    - "Title:"
  do_sample: false
  temperature: 0.0
fewshot_config:
  sampler: first_n
  samples: !function utils.get_squad_olmes_gen_fewshot
process_results: !function utils.process_results_squad
metric_list:
  - metric: em
    aggregation: mean
    higher_is_better: true
  - metric: f1 # primary metric
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
  description: "SQuAD reading comprehension (generative with token F1)"
