include: _drop_rc_template.yaml
task: drop_mc
dataset_path: allenai/drop-gen2mc
output_type: multiple_choice
doc_to_text: "Passage: {{passage_original | trim}}\nQuestion: {{question_original}}\n {{choices.label[0]}}. {{choices.text[0]}}\n {{choices.label[1]}}. {{choices.text[1]}}\n {{choices.label[2]}}. {{choices.text[2]}}\n {{choices.label[3]}}. {{choices.text[3]}}\nAnswer:"
doc_to_target: "{{answerKey}}"
doc_to_choice: "{{choices.label}}"
fewshot_config:
  sampler: first_n
  samples: !function utils.get_drop_rc_fewshot
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
  - metric: acc_norm
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
  description: "DROP - discrete reasoning over paragraphs (gen2mc multiple choice)"
  fewshot_source: "OLMES:drop_mc"
