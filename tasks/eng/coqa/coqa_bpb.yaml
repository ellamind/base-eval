include: _coqa_template.yaml
task: coqa_bpb
dataset_path: EleutherAI/coqa
dataset_kwargs:
  revision: refs/convert/parquet
output_type: loglikelihood
doc_to_text: "Story: {{story}}\n\nQ: {{questions.input_text[0]}}\nA:"
target_delimiter: ""
doc_to_target: " {{answers.input_text[0]}}"
process_results: !function utils.process_results_bpb
metric_list:
  - metric: bits_per_byte
    aggregation: mean
    higher_is_better: false
metadata:
  version: 1.0
  description: "CoQA - BPB evaluation"
