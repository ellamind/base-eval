include: _coqa_template.yaml
task: coqa_gen
dataset_path: EleutherAI/coqa
dataset_kwargs:
  revision: refs/convert/parquet
test_split: validation
process_docs: !function utils.process_docs_coqa_gen
output_type: generate_until
description: "Below is a passage followed by a conversation so far, where each turn in the conversation contains a question and an answer. Please answer the final question by referring to the passage and the previous questions.\n\n"
doc_to_text: "{{query}}"
doc_to_target: " {{answers[0]}}"
generation_kwargs:
  max_gen_toks: 50
  until:
    - "\n\n"
    - "Answer:"
    - "Question:"
  do_sample: false
  temperature: 0.0
process_results: !function utils.process_results_coqa
metric_list:
  - metric: em
    aggregation: mean
    higher_is_better: true
  - metric: f1 # olmes primary metric
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
  description: "CoQA conversational QA (generative with token F1)"
