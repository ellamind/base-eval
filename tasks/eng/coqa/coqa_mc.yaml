include: _coqa_template.yaml
task: coqa_mc
# Use gen2mc dataset with pre-generated multiple choice options (matches OLMES)
dataset_path: allenai/coqa-gen2mc
test_split: validation
process_docs: !function utils.process_docs_coqa_mc
output_type: multiple_choice
doc_to_text: "{{query_processed}}"
doc_to_target: "{{answerKey}}"
doc_to_choice: "{{choices.label}}"
metric_list:
  - metric: acc # olmes primary metric
    aggregation: mean
    higher_is_better: true
  - metric: acc_norm
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
  description: "CoQA - conversational question answering (gen2mc multiple choice)"
