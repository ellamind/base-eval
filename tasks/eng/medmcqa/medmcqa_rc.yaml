include: _medmcqa_template.yaml
task: medmcqa_rc
output_type: multiple_choice
doc_to_text: "Question: {{question}}\nAnswer:"
doc_to_target: "{{cop}}"
doc_to_choice: "{{[opa, opb, opc, opd]}}"
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
  - metric: acc_norm
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
  description: "MedMCQA - medical entrance exam questions (reading comprehension)"
