include: _sciq_template.yaml
task: sciq_rc
output_type: multiple_choice
# Use process_docs to shuffle choices (prevents position bias where correct answer is always first)
process_docs: !function utils.process_sciq_docs
doc_to_text: "{{support}}\n\nQuestion: {{question}}\nAnswer:"
doc_to_target: "{{gold}}"
doc_to_choice: "{{choices}}"
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
  - metric: acc_norm
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
  description: "SciQ - science question answering (with shuffled choices)"
