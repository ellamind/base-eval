include: _medqa_template.yaml
task: medqa_bpb
dataset_path: davidheineman/medqa-en
output_type: loglikelihood
doc_to_text: "Question: {{question}}\nAnswer:"
target_delimiter: ""
doc_to_target: " {{answer}}"
process_results: !function utils.process_results_bpb
metric_list:
  - metric: bits_per_byte
    aggregation: mean
    higher_is_better: false
metadata:
  version: 1.0
  description: "MedQA USMLE - BPB evaluation"
