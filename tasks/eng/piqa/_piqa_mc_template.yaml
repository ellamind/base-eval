# PiQA Multiple Choice Template
dataset_path: ybisk/piqa
dataset_kwargs:
  revision: refs/convert/parquet
test_split: validation
output_type: multiple_choice
num_fewshot: 5
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
  - metric: acc_norm
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
  fewshot_source: "OLMES:piqa"
