# DeepMind Math — 5-shot direct-answer, generate_until, SymPy-based exact_match
# Dataset: ellamind/deepmind-math-sample (100 per category, 56 categories)
# Pre-sampled with seed=1234 matching OLMES.
# Prompt format: "Problem:\n<question>\n\nAnswer:" with "Problem:" as stop sequence.
dataset_path: ellamind/deepmind-math-sample
test_split: test
fewshot_split: test
output_type: generate_until
doc_to_text: !function utils.doc_to_text
doc_to_target: !function utils.doc_to_target
target_delimiter: ""
num_fewshot: 5
generation_kwargs:
  max_gen_toks: 100
  do_sample: false
  temperature: 0
  until:
    - "Problem:"
    - "\n\n"
    - "</s>"
    - "<|eot_id|>"
process_results: !function utils.process_results
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
