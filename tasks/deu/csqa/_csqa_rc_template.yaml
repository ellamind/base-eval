# CSQA German Rank Choice Template
dataset_path: ellamind/csqa-multilingual
dataset_name: deu
validation_split: validation
fewshot_config:
  sampler: first_n
  samples: !function utils.list_fewshot_samples
output_type: multiple_choice
doc_to_text: "Frage: {{question}}\nAntwort:"
doc_to_target: "{{answer_idx}}"
doc_to_choice: "{{choices}}"
num_fewshot: 5
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
  - metric: acc_norm
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
