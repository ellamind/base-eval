# AGIEval German Multiple Choice Template
# Following OLMES :mc format — choices shown as " A. text", target is letter label.
dataset_path: ellamind/agieval-multilingual
dataset_name: deu
test_split: test
output_type: multiple_choice
doc_to_text: "Frage: {{question}}\n{% for i in range(choices|length) %} {{'ABCDE'[i]}}. {{choices[i]}}\n{% endfor %}Antwort:"
doc_to_target: "{{answer_idx}}"
doc_to_choice: "{{'ABCDE'[:choices|length] | list}}"
num_fewshot: 3
fewshot_config:
  sampler: first_n
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
  - metric: acc_norm
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
