# SocialIQA German BPB Template (answer-only, OLMES-style)
# BPB = -log2 P(answer | context) / bytes(answer)

dataset_path: ellamind/siqa-multilingual
dataset_name: deu
validation_split: validation
fewshot_config:
  sampler: first_n
  samples: !function utils.list_fewshot_samples
output_type: loglikelihood
target_delimiter: ""
doc_to_text: "Frage: {{context}} {{question}}\nAntwort:"
doc_to_target: " {{correct_answer}}"
num_fewshot: 5
process_results: !function utils.process_results_bpb
metric_list:
  - metric: bits_per_byte
    aggregation: mean
    higher_is_better: false
metadata:
  version: 1.0
