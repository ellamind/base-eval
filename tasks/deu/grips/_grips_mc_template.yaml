# GRIPS German Multiple Choice Template — 5-shot
# Dataset: ellamind/grips-base (German reasoning / wordplay / puzzle quiz)
# Choices (gold + distractors) are baked into the dataset and deterministically
# shuffled; answer_idx points at the gold option. Letter-labelled generative pick.
dataset_path: ellamind/grips-base
test_split: test
fewshot_split: fewshot
output_type: multiple_choice
doc_to_text: "Frage: {{question}}\n{% for i in range(choices|length) %}{{'ABCDE'[i]}}. {{choices[i]}}\n{% endfor %}Antwort:"
doc_to_target: "{{answer_idx}}"
doc_to_choice: "{{'ABCDE'[:choices|length] | list}}"
num_fewshot: 5
fewshot_config:
  sampler: first_n
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
  - metric: acc_norm
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
