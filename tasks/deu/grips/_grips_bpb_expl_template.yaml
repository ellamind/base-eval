# GRIPS German BPB Template (gold answer + explanation) — 5-shot
# Dataset: ellamind/grips-base
# Like the plain BPB variant, but the gold continuation is the answer followed
# by its explanation, measuring per-byte likelihood over the full reasoned
# answer.  BPB = -log2 P(answer + explanation | context) / bytes(continuation)
dataset_path: ellamind/grips-base
test_split: test
fewshot_split: fewshot
output_type: loglikelihood
target_delimiter: ""
doc_to_text: "Frage: {{question}}\nAntwort:"
doc_to_target: !function utils.doc_to_target_bpb_expl
num_fewshot: 5
fewshot_config:
  sampler: first_n
# Distinct metric name (not answer_bits_per_byte) so this diagnostic variant is
# NOT averaged together with the plain BPB tasks in suite aggregates.
process_results: !function utils.process_results_bpb_expl
metric_list:
  - metric: answer_expl_bits_per_byte
    aggregation: mean
    higher_is_better: false
metadata:
  version: 1.0
