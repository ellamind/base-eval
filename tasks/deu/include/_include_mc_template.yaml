# INCLUDE German Multiple Choice Template — 5-shot
# Dataset: CohereForAI/include-base-44 (German subset)
# Regional knowledge benchmark with 4-option MCQs from academic/professional exams.
# Uses German prompts (Frage:/Antwort:) instead of English as in upstream lm-eval-harness.
dataset_path: CohereForAI/include-base-44
dataset_name: German
test_split: test
output_type: multiple_choice
doc_to_text: !function utils.doc_to_text_mc
doc_to_target: !function utils.doc_to_target_mc
doc_to_choice: !function utils.doc_to_choice_mc
num_fewshot: 5
fewshot_config:
  sampler: first_n
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
  - metric: acc_norm
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
