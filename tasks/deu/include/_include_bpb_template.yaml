# INCLUDE German BPB Template — 5-shot (answer-only, OLMES-style)
# BPB = -log2 P(answer | context) / bytes(answer)
dataset_path: CohereForAI/include-base-44
dataset_name: German
test_split: test
output_type: loglikelihood
target_delimiter: ""
doc_to_text: !function utils.doc_to_text_rc
doc_to_target: !function utils.doc_to_target_bpb
num_fewshot: 5
fewshot_config:
  sampler: first_n
process_results: !function utils.process_results_bpb
metric_list:
  - metric: bits_per_byte
    aggregation: mean
    higher_is_better: false
metadata:
  version: 1.0
