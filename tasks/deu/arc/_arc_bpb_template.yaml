# ARC German BPB Template (answer-only, OLMES-style)
# Scores only the gold answer via loglikelihood, then converts to BPB.
# BPB = -log2 P(answer | context) / bytes(answer)

dataset_path: ellamind/arc-multilingual
dataset_name: deu
test_split: test
output_type: loglikelihood
target_delimiter: ""
doc_to_text: "Frage: {{question}}\nAntwort:"
doc_to_target: " {{choices['ABCDE'.index(answer_key)]}}"
num_fewshot: 5
fewshot_config:
  sampler: first_n
process_results: !function utils.process_results_bpb
metric_list:
  - metric: bits_per_byte
    aggregation: mean
    higher_is_better: false
metadata:
  version: 1.0
