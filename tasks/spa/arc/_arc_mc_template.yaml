# ARC Spanish Multiple Choice Template
dataset_path: ellamind/arc-multilingual
dataset_name: spa
test_split: test
output_type: multiple_choice
doc_to_text: "Pregunta: {{question}}\n{% for i in range(choices|length) %}{{'ABCDE'[i]}}. {{choices[i]}}\n{% endfor %}Respuesta:"
doc_to_target: "{{'ABCDE'.index(answer_key)}}"
doc_to_choice: "{{'ABCDE'[:choices|length] | list}}"
num_fewshot: 5
fewshot_config:
  sampler: first_n
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
  - metric: acc_norm
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
