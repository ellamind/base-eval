[workspace]
authors = ["maxidl <maximilian@ellamind.com>"]
channels = ["conda-forge"]
name = "eval_suite"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = ">=3.13,<3.14"
matplotlib = ">=3.10.8,<4"
seaborn = ">=0.13.2,<0.14"

[pypi-dependencies]
lm-eval = {version = "*", extras = ["api", "math", "multilingual", "hf_transfer"]}
transformers = ">=5.0.0, <6"
polars = ">=1.38.0, <2"
pyarrow = ">=23.0.0, <24"
pydantic = ">=2.12.5, <3"
